services:
  portainer:
    image: portainer/portainer-ce:2.20.2
    container_name: portainer
    restart: unless-stopped

    command: >
      --ssl
      --sslcert /data/certs/cert.pem
      --sslkey /data/certs/key.pem

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data

    ports:
      - "${PORTAINER_PORT:-9443}:9443"

    networks:
      - net_mgmt

networks:
  net_mgmt:
    external: true
